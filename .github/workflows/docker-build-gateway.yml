name: 构建并推送 Gateway 镜像

on:
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/clawpanel

jobs:
  build-gateway:
    name: 构建 Gateway
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 生成日期标签
        id: date
        shell: bash
        run: |
          echo "tag=$(date +'%Y.%m.%d')" >> "$GITHUB_OUTPUT"

      - name: 生成内联 Dockerfile
        shell: bash
        run: |
          cat > Dockerfile.gateway <<'EOF'
          FROM node:22-slim

          RUN apt-get update && apt-get install -y --no-install-recommends \
              git \
              curl \
              wget \
              ca-certificates \
           && rm -rf /var/lib/apt/lists/*

          RUN npm install -g @qingchencloud/openclaw-zh

          ENV NODE_COMPILE_CACHE=/var/tmp/openclaw-compile-cache
          ENV OPENCLAW_NO_RESPAWN=1
          ENV TZ=Asia/Shanghai

          VOLUME ["/root/.openclaw"]

          EXPOSE 18789

          CMD ["sh", "-c", "(openclaw init 2>/dev/null || true) && openclaw gateway start --foreground"]
          EOF

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.date.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
