name: 构建并推送 ClawPanel 到 GHCR

on:
  workflow_dispatch:
    inputs:
      upstream_version:
        description: "留空=自动获取最新正式版；填写例如 v1.0.0=构建指定版本"
        required: false
        default: ""
        type: string
      push_latest_tag:
        description: "是否额外推送 latest 标签"
        required: false
        default: false
        type: boolean
      force_rebuild:
        description: "即使 GHCR 已存在同版本标签也强制重建"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "30 2 * * *"

env:
  UPSTREAM_REPO: qingchencloud/clawpanel
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/clawpanel

jobs:
  build:
    name: 构建镜像
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: 检出当前 Fork 默认分支
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: fork-repo

      - name: 解析上游发布版本
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ env.UPSTREAM_REPO }}
          INPUT_VERSION: ${{ github.event.inputs.upstream_version }}
          PUSH_LATEST_INPUT: ${{ github.event.inputs.push_latest_tag }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${INPUT_VERSION:-}" ]; then
            echo "使用手动指定版本: ${INPUT_VERSION}"
            api="https://api.github.com/repos/${REPO}/releases/tags/${INPUT_VERSION}"
            mode="manual"
          else
            echo "未指定版本，自动获取最新正式版"
            api="https://api.github.com/repos/${REPO}/releases/latest"
            mode="auto"
          fi

          json=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api}")

          version=$(echo "${json}" | jq -r '.tag_name')

          if [ -z "${version}" ] || [ "${version}" = "null" ]; then
            echo "未获取到上游版本号"
            exit 1
          fi

          if [ "${mode}" = "auto" ]; then
            push_latest="true"
          else
            case "${PUSH_LATEST_INPUT:-false}" in
              true|True|TRUE|1|yes|YES)
                push_latest="true"
                ;;
              *)
                push_latest="false"
                ;;
            esac
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "push_latest=${push_latest}" >> "$GITHUB_OUTPUT"
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"

          echo "最终版本: ${version}"
          echo "模式: ${mode}"
          echo "推送 latest: ${push_latest}"

      - name: 按标签检出上游源码
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ steps.upstream.outputs.version }}
          fetch-depth: 1
          path: upstream-src

      - name: 检查 GHCR 是否已存在该版本标签
        id: check_tag
        env:
          VERSION: ${{ steps.upstream.outputs.version }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
        shell: bash
        run: |
          set -euo pipefail

          case "${FORCE_REBUILD:-false}" in
            true|True|TRUE|1|yes|YES)
              echo "exists=false" >> "$GITHUB_OUTPUT"
              echo "已启用强制重建，继续构建"
              exit 0
              ;;
          esac

          repo_path="${IMAGE_NAME#ghcr.io/}"
          check_url="https://ghcr.io/v2/${repo_path}/manifests/${VERSION}"

          if curl -fsSI \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            "${check_url}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "GHCR 已存在标签 ${VERSION}，跳过构建"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "GHCR 不存在标签 ${VERSION}，继续构建"
          fi

      - name: 准备版本分支内容
        if: steps.check_tag.outputs.exists != 'true'
        env:
          VERSION: ${{ steps.upstream.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p version-work
          rsync -a --delete \
            --exclude ".git" \
            upstream-src/ \
            version-work/

          cp fork-repo/Dockerfile version-work/Dockerfile
          cp fork-repo/.gitignore version-work/.gitignore

          echo "版本目录已准备完成: ${VERSION}"
          ls -la version-work | head -n 50

      - name: 推送源码到对应版本分支
        if: steps.check_tag.outputs.exists != 'true'
        env:
          VERSION: ${{ steps.upstream.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          cd fork-repo

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "${VERSION}" >/dev/null 2>&1; then
            git fetch origin "${VERSION}:${VERSION}"
            git switch "${VERSION}"
          else
            git switch --orphan "${VERSION}"
          fi

          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          rsync -a --delete ../version-work/ ./

          git add -A

          if git diff --cached --quiet; then
            echo "版本分支 ${VERSION} 无变化，跳过提交"
          else
            git commit -m "同步上游 ${VERSION}"
            git push origin "${VERSION}"
          fi

      - name: 生成 Docker 标签
        if: steps.check_tag.outputs.exists != 'true'
        id: tags
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.upstream.outputs.version }}
          PUSH_LATEST: ${{ steps.upstream.outputs.push_latest }}
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${VERSION}"
            if [ "${PUSH_LATEST}" = "true" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "将推送以下标签:"
          echo "${IMAGE_NAME}:${VERSION}"
          if [ "${PUSH_LATEST}" = "true" ]; then
            echo "${IMAGE_NAME}:latest"
          fi

      - name: 设置 QEMU
        if: steps.check_tag.outputs.exists != 'true'
        uses: docker/setup-qemu-action@v3

      - name: 设置 Buildx
        if: steps.check_tag.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        if: steps.check_tag.outputs.exists != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送多架构镜像
        if: steps.check_tag.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./version-work
          file: ./version-work/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
